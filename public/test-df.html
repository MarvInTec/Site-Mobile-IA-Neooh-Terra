<!DOCTYPE html>
<html>
<head>
  <script src="https://www.gstatic.com/dialogflow-console/fast/messenger-cx/bootstrap.js?v=1"></script>
</head>
<body>
  <df-messenger
    df-cx="true"
    location="us-central1"
    project-id="bootcam-llm-ai3"
    agent-id="0658f3b1-b782-459c-80ba-2a8c74db91c0"
    language-code="pt-br"
  ></df-messenger>
  <script>
    window.addEventListener('dfMessengerLoaded', function (event) {
      const dfMessenger = document.querySelector('df-messenger');
      
      dfMessenger.addEventListener('df-response-received', function (event) {
        console.log('Response:', event.detail);
      });

      setTimeout(() => {
        console.log('Sending query...');
        if (typeof dfMessenger.sendQuery === 'function') {
          dfMessenger.sendQuery('Oi');
        } else {
          console.log('sendQuery not found on dfMessenger');
          console.log(Object.keys(dfMessenger));
        }
      }, 3000);
    });
  </script>
</body>
</html>
