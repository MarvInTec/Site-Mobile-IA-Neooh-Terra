<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/Tarikul-Islam-Anik/Animated-Fluent-Emojis/master/Emojis/Travel%20and%20Places/Globe%20Showing%20Americas.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="NEOOH - Líder em inovação e tecnologia para mídia Out of Home (OOH). Conectando pessoas e marcas através de experiências digitais únicas e phygital." />
    <meta name="keywords" content="NEOOH, OOH, Out of Home, mídia digital, publicidade, tecnologia, inovação, phygital, DOOH, Digital Out of Home, marketing digital" />
    <meta name="author" content="NEOOH" />
    <title>NEOOH | O Futuro da Mídia é Agora</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- VLibras Widget -->
    <div vw class="enabled">
      <div vw-access-button class="active"></div>
      <div vw-plugin-wrapper>
        <div class="vw-plugin-top-wrapper"></div>
      </div>
    </div>
    <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
    <script>
      new window.VLibras.Widget('https://vlibras.gov.br/app');
    </script>

    <!-- Dialogflow CX Messenger -->
    <link rel="stylesheet" href="https://www.gstatic.com/dialogflow-console/fast/df-messenger/prod/v1/themes/df-messenger-default.css">
    <script src="https://www.gstatic.com/dialogflow-console/fast/df-messenger/prod/v1/df-messenger.js"></script>
    <df-messenger
      project-id="bootcam-llm-ai3"
      agent-id="0658f3b1-b782-459c-80ba-2a8c74db91c0"
      language-code="pt-br"
      max-query-length="-1">
      <df-messenger-chat-bubble
        chat-title="NEO AI"
        icon="/gemini-icon.svg">
      </df-messenger-chat-bubble>
    </df-messenger>
    <style>
      df-messenger {
        z-index: 999;
        position: fixed;
        --df-messenger-font-color: #000;
        --df-messenger-font-family: 'Inter', sans-serif;
        --df-messenger-chat-background: #ffffff;
        --df-messenger-message-user-background: #e91e8c; /* neo-pink */
        --df-messenger-message-user-font-color: #ffffff;
        --df-messenger-message-bot-background: #f3f4f6;
        --df-messenger-message-bot-font-color: #000000;
        --df-messenger-button-titlebar-color: #5b2c7d; /* neo-lilac */
        --df-messenger-button-titlebar-font-color: #ffffff;
        --df-messenger-chat-bubble-background: #ffffff; /* white background for the bubble */
        --df-messenger-chat-bubble-icon-color: #5b2c7d; /* neo-lilac for the close icon */
        --df-messenger-chat-window-width: 400px;
        --df-messenger-chat-window-height: 600px;
        bottom: 16px;
        right: 16px;
      }

      /* Tablet and smaller desktops with limited height */
      @media screen and (max-height: 750px) {
        df-messenger {
          --df-messenger-chat-window-height: calc(100vh - 100px);
        }
      }

      /* Tablet and Mobile devices */
      @media screen and (max-width: 768px) {
        df-messenger {
          --df-messenger-chat-window-width: calc(100vw - 32px);
          --df-messenger-chat-window-height: calc(100vh - 100px);
        }
      }
    </style>

    <script>
      document.addEventListener('DOMContentLoaded', () => {
        const dfMessenger = document.querySelector('df-messenger');
        if (!dfMessenger) return;

        let thinkingTimeout;

        window.addEventListener('df-request-sent', () => {
          const bubble = document.querySelector('df-messenger-chat-bubble');
          if (bubble) {
            bubble.setAttribute('chat-title', 'NEO está pensando...');
          }
          clearTimeout(thinkingTimeout);
          thinkingTimeout = setTimeout(() => {
            if (bubble) {
              bubble.setAttribute('chat-title', 'NEO AI');
            }
          }, 15000); // Oculta após 15s como fallback
        });

        window.addEventListener('df-response-received', () => {
          const bubble = document.querySelector('df-messenger-chat-bubble');
          if (bubble) {
            bubble.setAttribute('chat-title', 'NEO AI');
          }
          clearTimeout(thinkingTimeout);
        });

        let inactivityTimer;
        let warningTimer;
        let hasInteracted = false;

        const INACTIVITY_TIME = 300000; // 5 minutos
        const WARNING_TIME = 15000; // 15 segundos

        const resetTimers = () => {
          if (!hasInteracted) return;

          clearTimeout(inactivityTimer);
          clearTimeout(warningTimer);

          inactivityTimer = setTimeout(() => {
            const currentMessenger = document.querySelector('df-messenger');
            if (!currentMessenger) return;

            try {
              if (typeof currentMessenger.renderCustomText === 'function') {
                currentMessenger.renderCustomText('Você ainda está aí? O chat será limpo em 15 segundos por inatividade.');
              }
            } catch (e) {
              console.error('Erro ao enviar aviso de inatividade:', e);
            }

            warningTimer = setTimeout(() => {
              const messengerToClear = document.querySelector('df-messenger');
              if (!messengerToClear) return;

              try {
                if (typeof messengerToClear.clearStorage === 'function') {
                  messengerToClear.clearStorage();
                }
                if (typeof messengerToClear.startNewSession === 'function') {
                  messengerToClear.startNewSession();
                } else {
                  // Fallback: Remove and recreate the messenger to clear state
                  const parent = messengerToClear.parentNode;
                  if (parent) {
                    const newMessenger = document.createElement('df-messenger');
                    newMessenger.setAttribute('project-id', messengerToClear.getAttribute('project-id'));
                    newMessenger.setAttribute('agent-id', messengerToClear.getAttribute('agent-id'));
                    newMessenger.setAttribute('language-code', messengerToClear.getAttribute('language-code'));
                    newMessenger.setAttribute('max-query-length', messengerToClear.getAttribute('max-query-length'));
                    
                    const bubble = document.createElement('df-messenger-chat-bubble');
                    bubble.setAttribute('chat-title', 'NEO AI');
                    bubble.setAttribute('icon', '/gemini-icon.svg');
                    newMessenger.appendChild(bubble);
                    
                    parent.replaceChild(newMessenger, messengerToClear);
                  }
                }
                hasInteracted = false;
              } catch (e) {
                console.error('Erro ao limpar o chat:', e);
              }
            }, WARNING_TIME);
          }, INACTIVITY_TIME);
        };

        const onUserInteraction = () => {
          hasInteracted = true;
          resetTimers();
        };

        window.addEventListener('df-user-input-entered', onUserInteraction);
        window.addEventListener('df-request-sent', onUserInteraction);
        window.addEventListener('df-response-received', onUserInteraction);
      });
    </script>
  </body>
</html>
